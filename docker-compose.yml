services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sentinas
      POSTGRES_USER: sentinas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sentinas_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinas"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Langfuse (LLM observability) - uncomment when needed
  # langfuse:
  #   image: langfuse/langfuse:latest
  #   environment:
